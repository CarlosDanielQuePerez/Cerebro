<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anatomía Cerebral Animada - Carlos Daniel</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a12; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #info-panel {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(20, 15, 30, 0.9); backdrop-filter: blur(15px);
            border-left: 6px solid #b388ff; border-radius: 16px;
            padding: 25px; max-width: 320px; z-index: 1000;
            display: none; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translateX(-120%);
        }
        #info-panel.active { display: block; transform: translateX(0); }
        
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.8);
            padding: 20px 40px; border-radius: 50px; z-index: 2000;
            border: 1px solid #7c4dff; animation: pulse 2s infinite;
        }

        .legend {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 12px;
            font-size: 13px; border: 1px solid rgba(124, 77, 255, 0.4);
        }
        .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        
        button {
            background: #7c4dff; border: none; color: white; 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; 
            margin-top: 15px; transition: 0.3s;
        }
        button:hover { background: #9575cd; transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="loading">⏳ Inicializando Redes Neuronales...</div>

    <div id="info-panel">
        <h2 id="info-title" style="color:#b388ff; margin: 0 0 10px 0;">Estructura</h2>
        <p id="info-desc" style="line-height: 1.5; font-size: 14px; margin-bottom: 10px;"></p>
        <button onclick="document.getElementById('info-panel').classList.remove('active')">Cerrar</button>
    </div>

    <div class="legend">
        <div style="margin-bottom: 10px; font-weight: bold; color: #b388ff;">Mapa Interactivo</div>
        <div class="legend-item"><div class="dot" style="background:#4444ff"></div> H. Izquierdo (Lógica)</div>
        <div class="legend-item"><div class="dot" style="background:#ffff44"></div> H. Derecho (Creatividad)</div>
        <div class="legend-item"><div class="dot" style="background:#44ff44"></div> Cerebelo</div>
        <div class="legend-item"><div class="dot" style="background:#ff44ff"></div> Tronco Encefálico</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true; // ACTIVAR ROTACIÓN AUTOMÁTICA
        controls.autoRotateSpeed = 0.5;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7.5);
        scene.add(dirLight);

        const brainMap = {
            'brain_part_06': { color: 0xffff44, title: 'Hemisferio Derecho', desc: 'Controla el lado izquierdo del cuerpo y se especializa en la creatividad e intuición.' },
            'brain_part_02': { color: 0x44ff44, title: 'Cerebelo', desc: 'Pieza fundamental para el equilibrio y la coordinación motora fina.' },
            'brain_part_05': { color: 0xff44ff, title: 'Tronco Encefálico', desc: 'Regula funciones vitales como el latido cardíaco y la respiración.' },
            'brain_part_04': { color: 0x4444ff, title: 'Hemisferio Izquierdo', desc: 'Controla el lado derecho del cuerpo y se especializa en el lenguaje y la lógica.' }
        };

        const loader = new FBXLoader();
        loader.load('https://raw.githubusercontent.com/CarlosDanielQuePerez/Cerebro/main/brain.fbx', (object) => {
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const scale = 8 / Math.max(size.x, size.y, size.z);
            object.scale.setScalar(scale);
            object.position.sub(center.multiplyScalar(scale));

            object.traverse((child) => {
                if (child.isMesh) {
                    const data = brainMap[child.name.toLowerCase()];
                    if (data) {
                        child.material = new THREE.MeshPhongMaterial({ 
                            color: data.color, 
                            shininess: 100,
                            emissive: new THREE.Color(0x000000) 
                        });
                        child.userData.info = data;
                        child.userData.originalColor = data.color;
                    } else {
                        child.material = new THREE.MeshPhongMaterial({ color: 0x111111, transparent: true, opacity: 0.1 });
                        child.userData.ignore = true;
                    }
                }
            });
            scene.add(object);
            document.getElementById('loading').style.display = 'none';
        });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredObj = null;

        // ANIMACIÓN DE HOVER (BRILLO)
        window.addEventListener('mousemove', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(scene.children, true);
            
            // Resetear brillo anterior
            if (hoveredObj) {
                hoveredObj.material.emissive.setHex(0x000000);
                hoveredObj = null;
                document.body.style.cursor = 'default';
            }

            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                if (mesh.userData.info && !mesh.userData.ignore) {
                    mesh.material.emissive.setHex(0x333333); // Brillo suave
                    hoveredObj = mesh;
                    document.body.style.cursor = 'pointer';
                }
            }
        });

        window.addEventListener('click', (event) => {
            // Detener rotación al interactuar
            controls.autoRotate = false;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);
            if (intersects.length > 0) {
                const mesh = intersects[0].object;
                if (mesh.userData.info && !mesh.userData.ignore) {
                    const panel = document.getElementById('info-panel');
                    document.getElementById('info-title').innerText = "🧠 " + mesh.userData.info.title;
                    document.getElementById('info-desc').innerText = mesh.userData.info.desc;
                    panel.classList.add('active');
                }
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
