<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cerebro 3D - Escáner de Regiones</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a12; font-family: sans-serif; color: white; }
        #info-panel {
            position: absolute; bottom: 30px; left: 30px;
            background: rgba(20, 15, 30, 0.9); backdrop-filter: blur(10px);
            border-left: 6px solid #7c4dff; border-radius: 16px;
            padding: 20px; max-width: 300px; z-index: 1000;
            display: none; border: 1px solid rgba(255,255,255,0.1);
        }
        #info-panel.active { display: block; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: rgba(0,0,0,0.8);
            padding: 20px; border-radius: 50px; z-index: 2000;
        }
        .legend {
            position: absolute; top: 20px; right: 20px;
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 12px;
            font-size: 12px; border: 1px solid #7c4dff;
        }
    </style>
</head>
<body>

    <div id="loading">⏳ Escaneando modelo 3D...</div>

    <div id="info-panel">
        <h2 id="info-title" style="color:#b388ff; margin-top:0;">Estructura</h2>
        <p id="info-desc"></p>
        <p id="info-name" style="font-size: 10px; color: #888;"></p>
        <button onclick="document.getElementById('info-panel').classList.remove('active')" style="background:#7c4dff; border:none; color:white; padding:5px 10px; border-radius:5px; cursor:pointer;">Cerrar</button>
    </div>

    <div class="legend">
        <b>Si ves colores aleatorios:</b><br>
        Abre la consola (F12) y dime los nombres<br>
        de las piezas que aparecen ahí.
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a12);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);

        const brainData = {
            'frontal': { color: 0xff4444, desc: 'Controla el movimiento y razonamiento.' },
            'parietal': { color: 0x44ff44, desc: 'Procesa información sensorial.' },
            'temporal': { color: 0x4444ff, desc: 'Memoria y audición.' },
            'occipital': { color: 0xffff44, desc: 'Procesamiento visual.' },
            'cerebelo': { color: 0xff44ff, desc: 'Equilibrio y coordinación.' },
            'tronco': { color: 0x44ffff, desc: 'Funciones vitales.' }
        };

        const loader = new FBXLoader();
        const url = 'https://raw.githubusercontent.com/CarlosDanielQuePerez/Cerebro/main/brain.fbx';

        loader.load(url, (object) => {
            const box = new THREE.Box3().setFromObject(object);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const scale = 8 / Math.max(size.x, size.y, size.z);
            
            object.scale.setScalar(scale);
            object.position.sub(center.multiplyScalar(scale));

            console.log("--- LISTA DE PIEZAS EN TU MODELO ---");
            
            object.traverse((child) => {
                if (child.isMesh) {
                    // Imprime el nombre real en la consola (F12)
                    console.log("Nombre de la pieza:", child.name);

                    // Ponemos un material gris claro por defecto para que NO se vea negro
                    child.material = new THREE.MeshPhongMaterial({
                        color: 0xaaaaaa, 
                        transparent: true,
                        opacity: 0.9,
                        shininess: 100
                    });

                    const name = child.name.toLowerCase();
                    for (const key in brainData) {
                        if (name.includes(key)) {
                            child.material.color.setHex(brainData[key].color);
                            child.userData.regionKey = key;
                            break;
                        }
                    }
                    
                    // Guardamos el nombre para mostrarlo al hacer clic
                    child.userData.realName = child.name;
                    child.userData.clickable = true;
                }
            });

            scene.add(object);
            document.getElementById('loading').style.display = 'none';
        }, undefined, (err) => {
            document.getElementById('loading').innerText = "❌ Error: " + err.message;
        });

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
